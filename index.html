<!DOCTYPE html>

<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <!--
            <meta charset> Define o conjunto de caracteres (encondig) da página.
            UTF-8 garante que acentos e caracteres especiais apareçam corretamente.
        
        
        
        -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--
        <meta viewport>: esta tag e importante para sites que devem funcionar em dispostivos móveis
        (celular). width-device -> garante que a largura da página vai ser adptar a largura do dispositivo.
        initial-escale=1 -> não aplica zoom automático ao abrir a página.
        Sem ela o celular vai tentar mostrar a página como se fosse um comutador.
        -->
        <title>Jogo da Cobrinha lala</title>

        <!--
        Estilos e CSS vão ficar abaixo desta linha - Proxima aula
        -->

    </head>
    <body>
        <h3> Em breve teremos novidades lala</h3>
    </body>
    
</html>
