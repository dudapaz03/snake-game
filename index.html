<!DOCTYPE html>

<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <!--
            <meta charset> Define o conjunto de caracteres (encondig) da página.
            UTF-8 garante que acentos e caracteres especiais apareçam corretamente.
        
        
        
        -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--
        <meta viewport>: esta tag e importante para sites que devem funcionar em dispostivos móveis
        (celular). width-device -> garante que a largura da página vai ser adptar a largura do dispositivo.
        initial-escale=1 -> não aplica zoom automático ao abrir a página.
        Sem ela o celular vai tentar mostrar a página como se fosse um comutador.
        -->
        <title>Jogo da Cobrinha</title>

        <!--
        Estilos e CSS vão ficar abaixo desta linha - Proxima aula
        -->

        <style>


             .container{
                text-align: center;
                background-color: rgb(231, 161, 225);
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0px 10px 30px rgb(197, 85, 201);
             }
          .info{
             font-size: 1em;
          }
          .pontuacao {
              font-weight: bold;
              color:aquamarine;
          }

          .recorde {
            font-weight: bold;
              color:rgb(88, 191, 231);
          }
        </style>

    </head>
    <body> 

        <div class="container">
           <h1> &#128013; Jogo da Cobrinha  &#128511;</h1>
        
        <div class="info">
            <div class="pontuacao">
                  pontuação: 0
            </div>

           <div class="recorde">
                  recorde: 0
          
           </div>
        </div>
        </div>
        
    </body>
    
</html>
